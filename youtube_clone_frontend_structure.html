<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone — Frontend Structure</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #e2e2e2;
    --text-muted: #888;
    --text-dim: #4a4a4a;
    --accent: #ff0000;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    padding: 2.5rem 1.5rem;
  }

  .page { max-width: 860px; margin: 0 auto; }

  .header { margin-bottom: 2rem; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .logo-icon { width: 28px; height: 20px; background: var(--accent); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-icon::after { content: ''; width: 0; height: 0; border-style: solid; border-width: 5px 0 5px 9px; border-color: transparent transparent transparent #fff; margin-left: 2px; }
  .title { font-family: var(--sans); font-size: 1.4rem; font-weight: 600; letter-spacing: -0.03em; color: #fff; }
  .subtitle { font-family: var(--sans); font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
  .meta { display: flex; gap: 10px; margin-top: 1rem; flex-wrap: wrap; }
  .chip { font-family: var(--sans); font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-muted); }

  .toolbar { display: flex; gap: 8px; margin-bottom: 1.25rem; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--sans); font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--border-hover); color: var(--text); }
  .spacer { flex: 1; }
  .search-wrap { position: relative; }
  .search-wrap input { font-family: var(--mono); font-size: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 5px 10px 5px 28px; width: 180px; outline: none; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--border-hover); }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 12px; pointer-events: none; }

  .tree { line-height: 2; }
  .row { display: flex; align-items: baseline; gap: 0; border-radius: 5px; padding: 1px 6px; transition: background 0.1s; white-space: nowrap; overflow: hidden; }
  .row:hover { background: var(--bg2); }
  .row.folder { cursor: pointer; user-select: none; }
  .caret { display: inline-block; width: 14px; font-size: 9px; color: var(--text-dim); transition: transform 0.15s; flex-shrink: 0; }
  .caret.open { transform: rotate(90deg); }
  .icon { display: inline-block; width: 20px; font-size: 12px; flex-shrink: 0; }
  .name { color: var(--text); }
  .name.folder-name { color: #fff; font-weight: 500; }
  .name.dimmed { color: var(--text-dim); }
  .comment { font-family: var(--sans); font-size: 11px; color: var(--text-dim); margin-left: 10px; flex-shrink: 0; }
  .badge { font-family: var(--sans); font-size: 10px; padding: 1px 7px; border-radius: 4px; margin-left: 8px; vertical-align: middle; flex-shrink: 0; }

  .badge-purple { background: #1e1a3f; color: #a89fe8; }
  .badge-teal   { background: #0a2620; color: #5dcaa5; }
  .badge-amber  { background: #2a1800; color: #e09c3a; }
  .badge-blue   { background: #0a1f35; color: #6aaddf; }
  .badge-coral  { background: #2a1008; color: #e08060; }
  .badge-gray   { background: #1e1e1e; color: #888; }

  .collapsed { display: none; }
  .row.hidden { display: none; }
  .empty { font-family: var(--sans); font-size: 13px; color: var(--text-muted); padding: 2rem; text-align: center; display: none; }
  .empty.show { display: block; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo">
      <div class="logo-icon"></div>
      <span class="title">YouTube Clone</span>
    </div>
    <div class="subtitle">Frontend folder structure — Vite + React + JS</div>
    <div class="meta">
      <span class="chip">Vite</span>
      <span class="chip">React 18</span>
      <span class="chip">Redux Toolkit</span>
      <span class="chip">RTK Query</span>
      <span class="chip">React Router v6</span>
      <span class="chip">Tailwind CSS</span>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn" onclick="expandAll()">Expand all</button>
    <button class="btn" onclick="collapseAll()">Collapse all</button>
    <div class="spacer"></div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" placeholder="Search files..." oninput="searchTree(this.value)" />
    </div>
  </div>

  <div class="tree" id="tree"></div>
  <div class="empty" id="empty">No files match your search.</div>
</div>

<script>
const tree = [
  { type: 'file', name: 'index.html', comment: 'Vite entry point' },
  { type: 'file', name: 'vite.config.js', comment: 'path aliases, proxy /api' },
  { type: 'file', name: '.env', comment: 'VITE_API_BASE_URL etc.' },
  { type: 'file', name: 'package.json', dimmed: true },
  { type: 'file', name: '.eslintrc.cjs', dimmed: true },
  { type: 'folder', name: 'public', children: [
    { type: 'file', name: 'favicon.ico', dimmed: true },
    { type: 'file', name: 'logo.svg', dimmed: true },
  ]},
  { type: 'folder', name: 'src', open: true, children: [
    { type: 'file', name: 'main.jsx', comment: 'ReactDOM.createRoot' },
    { type: 'file', name: 'App.jsx', comment: 'router + providers' },
    { type: 'folder', name: 'assets', children: [
      { type: 'file', name: 'logo.svg', dimmed: true },
      { type: 'file', name: 'default-avatar.png', dimmed: true },
      { type: 'file', name: 'default-thumbnail.jpg', dimmed: true },
    ]},
    { type: 'folder', name: 'components', badge: 'shared UI', badgeClass: 'badge-gray', open: true, children: [
      { type: 'folder', name: 'ui', comment: 'primitives', open: true, children: [
        { type: 'file', name: 'Button.jsx' },
        { type: 'file', name: 'Input.jsx' },
        { type: 'file', name: 'Modal.jsx' },
        { type: 'file', name: 'Spinner.jsx' },
        { type: 'file', name: 'Avatar.jsx' },
        { type: 'file', name: 'Dropdown.jsx' },
        { type: 'file', name: 'Tooltip.jsx' },
        { type: 'file', name: 'Badge.jsx' },
        { type: 'file', name: 'ConfirmDialog.jsx' },
      ]},
      { type: 'folder', name: 'layout', open: true, children: [
        { type: 'file', name: 'Navbar.jsx' },
        { type: 'file', name: 'Sidebar.jsx' },
        { type: 'file', name: 'MiniSidebar.jsx' },
        { type: 'file', name: 'PageLayout.jsx' },
      ]},
      { type: 'folder', name: 'video', open: true, children: [
        { type: 'file', name: 'VideoCard.jsx', comment: 'thumbnail + meta' },
        { type: 'file', name: 'VideoGrid.jsx' },
        { type: 'file', name: 'VideoPlayer.jsx', comment: 'HTML5 + controls' },
        { type: 'file', name: 'VideoCardSkeleton.jsx' },
        { type: 'file', name: 'VideoInfo.jsx', comment: 'title, views, date' },
        { type: 'file', name: 'VideoActions.jsx', comment: 'like, share, save' },
      ]},
      { type: 'folder', name: 'channel', open: true, children: [
        { type: 'file', name: 'ChannelHeader.jsx' },
        { type: 'file', name: 'ChannelCard.jsx' },
        { type: 'file', name: 'SubscribeButton.jsx' },
      ]},
      { type: 'folder', name: 'comment', open: true, children: [
        { type: 'file', name: 'CommentBox.jsx' },
        { type: 'file', name: 'CommentThread.jsx' },
        { type: 'file', name: 'CommentInput.jsx' },
        { type: 'file', name: 'CommentItem.jsx' },
      ]},
      { type: 'folder', name: 'playlist', open: true, children: [
        { type: 'file', name: 'PlaylistCard.jsx' },
        { type: 'file', name: 'PlaylistPanel.jsx', comment: 'queue sidebar' },
        { type: 'file', name: 'SaveToPlaylist.jsx', comment: 'modal' },
      ]},
    ]},
    { type: 'folder', name: 'pages', badge: 'routes', badgeClass: 'badge-blue', open: true, children: [
      { type: 'file', name: 'Home.jsx', comment: 'feed' },
      { type: 'file', name: 'Watch.jsx', comment: '/watch?v=:id' },
      { type: 'file', name: 'Search.jsx', comment: '/search?q=' },
      { type: 'file', name: 'Channel.jsx', comment: '/@handle' },
      { type: 'file', name: 'Subscriptions.jsx' },
      { type: 'file', name: 'History.jsx' },
      { type: 'file', name: 'Library.jsx' },
      { type: 'file', name: 'NotFound.jsx' },
      { type: 'folder', name: 'auth', open: true, children: [
        { type: 'file', name: 'Login.jsx' },
        { type: 'file', name: 'Register.jsx' },
        { type: 'file', name: 'ForgotPassword.jsx' },
      ]},
      { type: 'folder', name: 'studio', badge: 'creator', badgeClass: 'badge-purple', open: true, children: [
        { type: 'file', name: 'Dashboard.jsx' },
        { type: 'file', name: 'Upload.jsx' },
        { type: 'file', name: 'VideoList.jsx' },
        { type: 'file', name: 'EditVideo.jsx' },
        { type: 'file', name: 'Analytics.jsx' },
        { type: 'file', name: 'LiveStream.jsx' },
      ]},
      { type: 'folder', name: 'settings', open: true, children: [
        { type: 'file', name: 'Profile.jsx' },
        { type: 'file', name: 'Notifications.jsx' },
        { type: 'file', name: 'Memberships.jsx' },
      ]},
    ]},
    { type: 'folder', name: 'features', badge: 'feature slices', badgeClass: 'badge-teal', open: true, children: [
      { type: 'folder', name: 'auth', open: true, children: [
        { type: 'file', name: 'authSlice.js', comment: 'user, token, isAuth' },
        { type: 'file', name: 'authApi.js', comment: 'login, register, refresh' },
        { type: 'file', name: 'ProtectedRoute.jsx' },
        { type: 'file', name: 'GuestRoute.jsx' },
      ]},
      { type: 'folder', name: 'video', open: true, children: [
        { type: 'file', name: 'videoSlice.js' },
        { type: 'file', name: 'videoApi.js', comment: 'CRUD + feed + upload' },
      ]},
      { type: 'folder', name: 'comment', open: true, children: [
        { type: 'file', name: 'commentSlice.js' },
        { type: 'file', name: 'commentApi.js' },
      ]},
      { type: 'folder', name: 'channel', open: true, children: [
        { type: 'file', name: 'channelApi.js' },
      ]},
      { type: 'folder', name: 'playlist', open: true, children: [
        { type: 'file', name: 'playlistSlice.js' },
        { type: 'file', name: 'playlistApi.js' },
      ]},
      { type: 'folder', name: 'notification', open: true, children: [
        { type: 'file', name: 'notificationSlice.js' },
        { type: 'file', name: 'notificationApi.js' },
      ]},
      { type: 'folder', name: 'search', open: true, children: [
        { type: 'file', name: 'searchApi.js' },
      ]},
      { type: 'folder', name: 'livestream', open: true, children: [
        { type: 'file', name: 'livestreamSlice.js' },
        { type: 'file', name: 'livestreamApi.js' },
      ]},
      { type: 'folder', name: 'like', open: true, children: [
        { type: 'file', name: 'likeApi.js', comment: 'polymorphic like/dislike' },
      ]},
    ]},
    { type: 'folder', name: 'hooks', badge: 'custom hooks', badgeClass: 'badge-amber', open: true, children: [
      { type: 'file', name: 'useAuth.js' },
      { type: 'file', name: 'useDebounce.js' },
      { type: 'file', name: 'useInfiniteScroll.js' },
      { type: 'file', name: 'useVideoPlayer.js' },
      { type: 'file', name: 'useWatchProgress.js', comment: 'debounced upsert' },
      { type: 'file', name: 'useSubscription.js' },
      { type: 'file', name: 'useLocalStorage.js' },
      { type: 'file', name: 'useClickOutside.js' },
    ]},
    { type: 'folder', name: 'store', badge: 'Redux', badgeClass: 'badge-purple', open: true, children: [
      { type: 'file', name: 'store.js', comment: 'configureStore' },
      { type: 'file', name: 'rootReducer.js' },
    ]},
    { type: 'folder', name: 'services', badge: 'API layer', badgeClass: 'badge-coral', open: true, children: [
      { type: 'file', name: 'axiosInstance.js', comment: 'baseURL + interceptors' },
      { type: 'file', name: 'baseApi.js', comment: 'RTK Query base' },
    ]},
    { type: 'folder', name: 'utils', open: true, children: [
      { type: 'file', name: 'formatDuration.js', comment: '3600 → 1:00:00' },
      { type: 'file', name: 'formatCount.js', comment: '1200 → 1.2K' },
      { type: 'file', name: 'timeAgo.js', comment: 'relative timestamps' },
      { type: 'file', name: 'cn.js', comment: 'classnames helper' },
      { type: 'file', name: 'validators.js' },
    ]},
    { type: 'folder', name: 'constants', open: true, children: [
      { type: 'file', name: 'routes.js', comment: 'route path strings' },
      { type: 'file', name: 'queryKeys.js' },
      { type: 'file', name: 'config.js', comment: 'app-wide constants' },
    ]},
    { type: 'folder', name: 'styles', open: true, children: [
      { type: 'file', name: 'index.css', comment: 'Tailwind directives' },
      { type: 'file', name: 'variables.css', comment: 'CSS custom props' },
    ]},
  ]},
];

let idCounter = 0;
const nodeMap = {};

function renderNode(node, depth) {
  const id = 'n' + (idCounter++);
  const indent = depth * 16;

  if (node.type === 'file') {
    const rowId = 'row-' + id;
    nodeMap[rowId] = node.name.toLowerCase();
    return `<div class="row" id="${rowId}" style="padding-left:${indent + 22}px">
      <span class="icon" style="color:#444;font-size:10px">·</span>
      <span class="name${node.dimmed ? ' dimmed' : ''}">${node.name}</span>
      ${node.comment ? `<span class="comment">// ${node.comment}</span>` : ''}
    </div>`;
  }

  const isOpen = node.open !== false;
  const rowId = 'row-' + id;
  nodeMap[rowId] = node.name.toLowerCase();

  let html = `<div class="row folder" id="${rowId}" onclick="toggle('${id}')" style="padding-left:${indent}px">
    <span class="caret${isOpen ? ' open' : ''}" id="caret-${id}">▶</span>
    <span class="icon">${isOpen ? '📂' : '📁'}</span>
    <span class="name folder-name">${node.name}/</span>
    ${node.badge ? `<span class="badge ${node.badgeClass || 'badge-gray'}">${node.badge}</span>` : ''}
    ${node.comment ? `<span class="comment">// ${node.comment}</span>` : ''}
  </div>`;

  if (node.children && node.children.length) {
    html += `<div id="${id}" class="${isOpen ? '' : 'collapsed'}">`;
    node.children.forEach(child => { html += renderNode(child, depth + 1); });
    html += `</div>`;
  }
  return html;
}

document.getElementById('tree').innerHTML = tree.map(n => renderNode(n, 0)).join('');

function toggle(id) {
  const el = document.getElementById(id);
  const caret = document.getElementById('caret-' + id);
  const isOpen = !el.classList.contains('collapsed');
  el.classList.toggle('collapsed', isOpen);
  caret.classList.toggle('open', !isOpen);
}

function expandAll() {
  document.querySelectorAll('[id^="n"]').forEach(el => {
    if (el.tagName === 'DIV' && !el.classList.contains('row')) el.classList.remove('collapsed');
  });
  document.querySelectorAll('.caret').forEach(c => c.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('[id^="n"]').forEach(el => {
    if (el.tagName === 'DIV' && !el.classList.contains('row')) el.classList.add('collapsed');
  });
  document.querySelectorAll('.caret').forEach(c => c.classList.remove('open'));
}

function searchTree(q) {
  q = q.toLowerCase().trim();
  if (!q) {
    document.querySelectorAll('.row').forEach(r => r.classList.remove('hidden'));
    document.getElementById('empty').classList.remove('show');
    return;
  }
  expandAll();
  let anyVisible = false;
  document.querySelectorAll('.row').forEach(row => {
    const name = row.querySelector('.name')?.textContent?.toLowerCase() || '';
    const comment = row.querySelector('.comment')?.textContent?.toLowerCase() || '';
    const match = name.includes(q) || comment.includes(q);
    row.classList.toggle('hidden', !match);
    if (match) anyVisible = true;
  });
  document.getElementById('empty').classList.toggle('show', !anyVisible);
}
</script>
</body>
</html>
